# Services de développement local : PostgreSQL + Mailpit (boîte mail de test).
# Lancer :  docker compose up -d
#   - Postgres  → localhost:5432
#   - Mailpit   → SMTP localhost:1025  |  UI web http://localhost:8025
services:
  db:
    image: postgres:16-alpine
    container_name: procurement_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: procurement
    ports:
      - "5433:5432" # 5433 côté hôte pour éviter le Postgres local sur 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d procurement"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: procurement_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # serveur SMTP
      - "8025:8025" # interface web
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  pgdata:
